name: qemu-windows

# Cross-compiles the fully-static Windows QEMU (x86_64) from source with the
# Fedora MinGW-w64 toolchain, in a container on a Linux runner — no Windows
# runner needed. Proves static linkage (PE-import gate) and runs Wine smoke
# checks; the real WHPX boot test is manual on a Windows host.

on:
  workflow_dispatch:
  push:
    paths:
      - "build/qemu/Dockerfile.windows"
      - "build/qemu/build-windows.sh"
      - "build/qemu/verify-windows.sh"
      - "build/qemu/archive.sh"
      - "build/qemu/versions.env"
      - ".github/workflows/qemu-windows.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build + verify static Windows QEMU
        working-directory: build/qemu
        run: ./build-windows.sh

      - name: Wine run-checks (native amd64)
        working-directory: build/qemu
        continue-on-error: true
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends wine64
          exe=stage-windows-amd64/stage/qemu-system-x86_64.exe
          wine64 "$exe" --version | head -1
          echo "accelerators:"; wine64 "$exe" -accel help 2>&1 | grep -iE 'whpx|tcg' || true

      - name: Archive binaries (+ sha256)
        working-directory: build/qemu
        run: ./archive.sh windows-amd64 stage-windows-amd64/stage

      - name: Upload binary archive
        uses: actions/upload-artifact@v4
        with:
          name: qemu-windows-amd64
          path: |
            build/qemu/qemu-windows-amd64-*.tar.gz
            build/qemu/qemu-windows-amd64-*.tar.gz.sha256
          if-no-files-found: error
